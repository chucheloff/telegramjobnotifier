services:
  bot:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: uv run bot.main

  server:
    build: .
    ports:
      - "8000:8000"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - BOT_HTTP_URL=http://bot:8080
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - bot
    command: uv run uvicorn server.main:app --host 0.0.0.0 --port 8000
